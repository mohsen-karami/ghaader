name: ESLint

on:
  push:
    branches: [master]
    paths:
      - 'src/**/*.js'
      - 'src/**/*.mjs'
      - 'src/**/*.cjs'
      - 'eslint.config.js'
  pull_request:
    branches: [master]
    paths:
      - 'src/**/*.js'
      - 'src/**/*.mjs'
      - 'src/**/*.cjs'
      - 'eslint.config.js'

permissions:
  checks: write
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Source Files

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
